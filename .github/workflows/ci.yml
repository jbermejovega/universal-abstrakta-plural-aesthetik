name: UAP SIGIL CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - agent/**

permissions:
  contents: read

concurrency:
  group: uap-sigil-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Node ${{ matrix.node-version }} build and test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

  package-dry-run:
    name: Package dry run
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify npm package contents
        run: npm pack --dry-run
