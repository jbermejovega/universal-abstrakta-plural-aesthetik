version: SYNTHGOTHHUB_RAG_MCP_QKC_V1
repository: jbermejovega/universal-abstrakta-plural-aesthetik
upstream_policy: jbermejovega/sigilbook:.sigil/qkc-rag-mcp.yaml
role: universal_plural_aesthetic_projection_surface
authority:
  canonical_registry: jbermejovega/sigilbook
  local_artwork_truth: git_history
  author: Jara Juana Bermejo Vega
  theory: SIGIL
rag:
  mode: multimodal_source_bound_projection
  local_first: true
  provenance_required: true
  immutable_ref_required: true
  source_path_required: true
  content_hash_required: true
  retrieval_is_not_truth: true
  may_index:
    - artworks
    - graphical_calculus_witnesses
    - typed_aesthetic_manifests
    - accessibility_and_palette_metadata
    - render_traces
  must_not:
    - replace_canonical_artwork_identity
    - flatten_plural_sections
    - detach_artwork_from_authorship
    - promote_generated_render_to_canonical_without_review
mcp:
  mode: bounded_multimodal_projection
  tools_are_projections: true
  tools_are_not_authority: true
  writes_require: [read_first, diff_first, branch, pull_request]
qkc:
  context_dependency_declared: true
  uap_projection_required: true
  strikk_validation_required: true
  renormalization_flow_invariant: true
invariants:
  - PIORNALEGO_ES_CANON
  - SAFE_REPLAY
  - TRACE_PRESERVED
  - PI_FIXED
  - NO_IDENTITY_TRANSPORT
  - NO_SECTION_COLLAPSE
  - NO_PLURAL_COLLAPSE
  - JJBV_TYPED
  - PLURAL_TYPED
  - QUNOTYPED
relations:
  - source: jbermejovega/sigilbook
    type: canonical_registry_projects_to
    target: jbermejovega/universal-abstrakta-plural-aesthetik
  - source: jbermejovega/universal-abstrakta-plural-aesthetik
    type: typed_aesthetic_projection_glues_to
    target: jbermejovega/sigil4cpython
  - source: jbermejovega/universal-abstrakta-plural-aesthetik
    type: provenance_acknowledges
    target: ceciCoding/accessible-color-palette
status: draft_pr_gated
